services:
  mqtt:
    image: eclipse-mosquitto:latest
    container_name: mqtt_broker
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ~/mosquitto/config:/mosquitto/config

  influxdb:
    image: influxdb:2.7
    container_name: influx_db
    restart: always
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2

  api:
    build: ./api  # Docker va construire l'image à partir de ton Dockerfile
    container_name: api_composteur
    environment:
      - TZ=Europe/Paris
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mqtt
      - influxdb

  fronted:
    build: ./web
    container_name: site_composteur
    ports:
      - "8080:80"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf
    restart: always
    depends_on:
      - api

volumes:
  influxdb_data:
