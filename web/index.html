<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Composteur Connecté</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Plugin zoom -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

  <style>
    body { font-family: Arial; background:#f4f6f8; margin:0; }

    header {
      background:#2e7d32;
      color:white;
      padding:20px;
      text-align:center;
    }

    .container {
      padding:20px;
      display:grid;
      grid-template-columns: repeat(4,1fr);
      gap:20px;
    }

    .card {
      background:white;
      border-radius:10px;
      padding:20px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    .value {
      font-size:30px;
      font-weight:bold;
      color:#2e7d32;
    }

    .graphs {
      grid-column:1 / -1;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    button {
      padding:10px;
      background:#2e7d32;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    button:disabled { background:#aaa; }

    .switch {
      display:inline-block;
      width:55px;
      height:28px;
      position:relative;
      margin:10px;
    }

    .switch input { display:none; }

    .slider {
      position:absolute;
      background:#ccc;
      border-radius:30px;
      inset:0;
      cursor:pointer;
    }

    .slider:before {
      content:"";
      position:absolute;
      height:22px;
      width:22px;
      left:3px;
      bottom:3px;
      background:white;
      border-radius:50%;
      transition:0.3s;
    }

    input:checked + .slider { background:#ff9800; }
    input:checked + .slider:before { transform:translateX(26px); }

    canvas { height:220px !important; }

    footer { text-align:center; padding:10px; color:#777; }
  </style>
</head>

<body>

<header>
  <h1>🌱 Composteur Connecté</h1>
</header>

<div class="container">

  <div class="card">
    <h2>🌡️ Température</h2>
    <div class="value" id="temperature">-- °C</div>
  </div>

  <div class="card">
    <h2>💧 Humidité</h2>
    <div class="value" id="humidite">-- %</div>
  </div>

  <div class="card">
    <h2>🔁 Mode</h2>

    <label class="switch">
      <input type="checkbox" id="modeSwitch">
      <span class="slider"></span>
    </label>

    <p id="modeLabel">AUTO</p>

    <button id="waterBtn" disabled onclick="arroser()">
      💦 Arroser
    </button>
  </div>

  <div class="card">
    <h2>🔄 Données</h2>
    <button onclick="refreshData()">Actualiser</button>
  </div>

  <div class="graphs">
    <div class="card">
      <h2>📊 Historique Température</h2>
      <canvas id="tempChart"></canvas>
    </div>
    <div class="card">
      <h2>📊 Historique Humidité</h2>
      <canvas id="humidChart"></canvas>
    </div>
  </div>

</div>

<footer>Projet IoT</footer>

<script>
let labels = [];
let tempHistory = [];
let humidHistory = [];

let interval;
let waterInterval;
let autoMode = true;

const switchEl = document.getElementById("modeSwitch");
const labelEl = document.getElementById("modeLabel");
const waterBtn = document.getElementById("waterBtn");

/* CONFIG ZOOM */
const zoomOptions = {
  pan: {
    enabled: true,
    mode: 'x'
  },
  zoom: {
    wheel: {
      enabled: true
    },
    pinch: {
      enabled: true
    },
    mode: 'x'
  }
};

/* GRAPHIQUES */
const tempChart = new Chart(document.getElementById('tempChart'), {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Température (°C)',
      data: [],
      borderColor: '#2e7d32',
      backgroundColor: 'rgba(46,125,50,0.2)',
      tension: 0.3
    }]
  },
  options: {
    plugins: {
      zoom: zoomOptions
    }
  }
});

const humidChart = new Chart(document.getElementById('humidChart'), {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Humidité (%)',
      data: [],
      borderColor: '#0277bd',
      backgroundColor: 'rgba(2,119,189,0.2)',
      tension: 0.3
    }]
  },
  options: {
    plugins: {
      zoom: zoomOptions
    }
  }
});

/* API DATA */
async function refreshData() {
  try {
    const resLast = await fetch("http://167.99.87.179:3000/api/last");
    const last = await resLast.json();

    // On s'assure de matcher EXACTEMENT les clés de server.js
    document.getElementById("temperature").textContent = (last.temperature !== undefined ? last.temperature : "--") + " °C";
    document.getElementById("humidite").textContent = (last.humidite !== undefined ? last.humidite : "--") + " %";

    const resHist = await fetch("http://167.99.87.179:3000/api/history");
    const history = await resHist.json();

    if (history.length > 0) {
      labels = history.map(i => {
        const d = new Date(i._time);
        return d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
      });

      // Utilise exactement les noms de champs InfluxDB
      tempHistory = history.map(i => i.temperature ?? 0);
      humidHistory = history.map(i => i.humidite ?? 0);

      tempChart.data.labels = labels;
      tempChart.data.datasets[0].data = tempHistory;
      humidChart.data.labels = labels;
      humidChart.data.datasets[0].data = humidHistory;

      tempChart.update();
      humidChart.update();
    }
  } catch(e) {
    console.error("Erreur API :", e);
  }
}
       

/* MODE */
function updateMode() {
  autoMode = !switchEl.checked;

  if (autoMode) {
    labelEl.textContent = "AUTO";
    waterBtn.disabled = true;

    interval = setInterval(refreshData, 5000);
    waterInterval = setInterval(arroser, 30000);

  } else {
    labelEl.textContent = "MANUEL";
    waterBtn.disabled = false;

    clearInterval(interval);
    clearInterval(waterInterval);
  }
}

switchEl.addEventListener("change", updateMode);

/* ARROSAGE */
async function arroser() {
  const btn = document.getElementById("waterBtn");

  if (!autoMode) {
    btn.disabled = true;
    btn.textContent = "Arrosage...";
  }

  try {
    await fetch("http://167.99.87.179:3000/api/water", {
      method: "POST"
    });

    if (!autoMode) btn.textContent = "✔ Arrosé";

  } catch {
    if (!autoMode) btn.textContent = "Erreur ❌";
  }

  if (!autoMode) {
    setTimeout(() => {
      btn.textContent = "💦 Arroser";
      btn.disabled = false;
    }, 2000);
  }
}

/* INIT */
refreshData();
interval = setInterval(refreshData, 8000);
waterInterval = null;

</script>

</body>
</html>
