<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Composteur Connecté</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; }
    header { background:#2e7d32; color:white; padding:20px; text-align:center; }
    .container { padding:20px; display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:20px; }
    .card { background:white; border-radius:10px; padding:20px; box-shadow:0 4px 10px rgba(0,0,0,0.1); text-align:center; }
    .value { font-size:30px; font-weight:bold; color:#2e7d32; }
    .graphs { grid-column: 1 / -1; display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
    @media (max-width: 800px) { .graphs { grid-template-columns: 1fr; } }
    
    button { padding:10px 20px; background:#2e7d32; color:white; border:none; border-radius:5px; cursor:pointer; font-size: 16px; }
    button:disabled { background:#aaa; cursor: not-allowed; }

    /* --- STYLE DU SWITCH --- */
    .switch { display:inline-block; width:60px; height:34px; position:relative; margin:10px; }
    .switch input { display:none; }
    .slider { position:absolute; background:#ccc; border-radius:34px; inset:0; cursor:pointer; transition: 0.4s; }
    .slider:before { content:""; position:absolute; height:26px; width:26px; left:4px; bottom:4px; background:white; border-radius:50%; transition:0.4s; }

    /* LOGIQUE : Quand c'est coché (droite), c'est le mode MANUEL (couleur orange) */
    input:checked + .slider { background:#ff9800; } 
    input:checked + .slider:before { transform:translateX(26px); }

    canvas { height:250px !important; }
    footer { text-align:center; padding:20px; color:#777; }
  </style>
</head>

<body>

<header>
  <h1>🌱 Composteur Connecté</h1>
</header>

<div class="container">
  <div class="card">
    <h2>🌡️ Température</h2>
    <div class="value" id="temperature">-- °C</div>
  </div>

  <div class="card">
    <h2>💧 Humidité</h2>
    <div class="value" id="humidite">-- %</div>
  </div>

  <div class="card">
    <h2>🔁 Mode de Gestion</h2>
    <div>
      <span id="modeLabel" style="font-weight: bold; font-size: 18px;">--</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="modeSwitch">
      <span class="slider"></span>
    </label>
    <div style="margin-top:10px;">
        <button id="waterBtn" disabled>💦 Arroser</button>
    </div>
  </div>

  <div class="card">
    <h2>🔄 Actualisation</h2>
    <button id="refreshBtn">Actualiser les graphes</button>
  </div>

  <div class="graphs">
    <div class="card">
      <h2>📊 Historique Température</h2>
      <canvas id="tempChart"></canvas>
    </div>
    <div class="card">
      <h2>📊 Historique Humidité</h2>
      <canvas id="humidChart"></canvas>
    </div>
  </div>
</div>

<footer>Projet BTS IoT</footer>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
let tempChart, humidChart;
let autoMode = false;

const socket = io("https://composteur.cielnewton.fr");
const switchEl = document.getElementById("modeSwitch");
const labelEl = document.getElementById("modeLabel");
const waterBtn = document.getElementById("waterBtn");
const refreshBtn = document.getElementById("refreshBtn");

function applyModeUpdate(mode) {
    console.log("🎨 Sync Interface :", mode);
    
    // Si mode est MANUEL, on coche le switch (droite)
    // Si mode est AUTO, on décoche le switch (gauche)
    if (switchEl) {
        switchEl.checked = (mode === "MANUEL");
    }
    
    if (labelEl) labelEl.textContent = mode;

    autoMode = (mode === "AUTO");
    if (waterBtn) {
        waterBtn.disabled = autoMode;
        waterBtn.style.opacity = autoMode ? "0.5" : "1";
    }
}

function initCharts() {
    const config = (label, color, bgColor) => ({
        type: 'line',
        data: { labels: [], datasets: [{ label, data: [], borderColor: color, backgroundColor: bgColor, tension: 0.3, fill: true }] },
        options: { responsive: true, maintainAspectRatio: false }
    });
    tempChart = new Chart(document.getElementById('tempChart'), config('Température (°C)', '#2e7d32', 'rgba(46,125,50,0.1)'));
    humidChart = new Chart(document.getElementById('humidChart'), config('Humidité (%)', '#0277bd', 'rgba(2,119,189,0.1)'));
}

async function refreshHistory() {
    try {
        const res = await fetch("https://composteur.cielnewton.fr/api/history");
        const history = await res.json();
        if (history && history.length > 0) {
            const labels = history.map(i => new Date(i._time).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }));
            tempChart.data.labels = labels;
            tempChart.data.datasets[0].data = history.map(i => i.temperature ?? 0);
            tempChart.update('none'); 
            humidChart.data.labels = labels;
            humidChart.data.datasets[0].data = history.map(i => i.humidite ?? 0);
            humidChart.update('none');
        }
    } catch(e) { console.error("❌ Erreur historique :", e); }
}

async function initMode() {
    try {
        const response = await fetch("https://composteur.cielnewton.fr/api/mode");
        const data = await response.json();
        applyModeUpdate(data.mode);
    } catch (e) { console.error("❌ Erreur init mode :", e); }
}

socket.on("updateData", (data) => {
    document.getElementById("temperature").textContent = (data.temperature ?? "--") + " °C";
    document.getElementById("humidite").textContent = (data.humidite ?? "--") + " %";
    refreshHistory(); 
});

socket.on("updateMode", (data) => {
    applyModeUpdate(data.mode);
});

if (switchEl) {
    switchEl.addEventListener("click", async (e) => {
        e.preventDefault(); 
        // Si le texte est MANUEL, on veut passer en AUTO
        const nouveauMode = (labelEl.textContent.trim() === "MANUEL") ? "AUTO" : "MANUEL";
        try {
            await fetch("https://composteur.cielnewton.fr/api/mode", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ mode: nouveauMode })
            });
        } catch (err) { console.error("❌ Erreur envoi mode :", err); }
    });
}

async function arroser() {
    if (autoMode || !waterBtn) return;
    try {
        await fetch("https://composteur.cielnewton.fr/api/water", {
            method: "POST",
            headers: { "Content-Type": "application/json" }
        });
    } catch (err) { console.error("❌ Erreur arrosage :", err); }
}

if (waterBtn) waterBtn.addEventListener("click", arroser);
if (refreshBtn) refreshBtn.addEventListener("click", refreshHistory);

async function startApp() {
    initCharts();
    await initMode();
    await refreshHistory();
}
startApp();
</script>
</body>
</html>
